<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♻️ EcoRecicla - Registrarse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page bg-forest">
    <!-- ==========================================================
         NAVBAR
         ========================================================== -->
    <nav class="navbar-index">
        <div class="navbar-index-container">
            <!-- Logo y nombre -->
            <div class="navbar-index-logo">
                <i class="fas fa-recycle"></i>
                <span>EcoRecicla</span>
            </div>

            <!-- Enlaces de navegación -->
            <div class="navbar-index-links">
                <a href="{{ url_for('index') }}" class="nav-index-btn nav-index-login">
                    <i class="fas fa-home"></i> Inicio
                </a>
                <a href="{{ url_for('login_page') }}" class="nav-index-btn nav-index-register">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </a>
                <!-- Botón modo oscuro -->
                <button id="themeToggleAuth" class="nav-index-theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- ==========================================================
         CONTENEDOR PRINCIPAL
         ========================================================== -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus auth-icon"></i>
                <h1>Crear Cuenta</h1>
                <p>Únete a la comunidad de reciclaje</p>
            </div>
            <div class="auth-body">
                <div id="mensajeRegistro" class="mensaje-auth"></div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre completo</label>
                    <input type="text" id="reg_nombre" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="reg_email" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="reg_password" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirmar contraseña</label>
                    <input type="password" id="reg_password2" placeholder="••••••••">
                </div>
                <button class="btn-auth" onclick="registrarUsuario()"><i class="fas fa-user-plus"></i> REGISTRARSE</button>
                <p class="auth-link">¿Ya tienes cuenta? <a href="{{ url_for('login_page') }}">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <!-- ==========================================================
         FOOTER
         ========================================================== -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo"><i class="fas fa-recycle"></i><span>EcoRecicla</span></div>
            <p>🌱 Reciclaje inteligente con IA - ¡Cada botella cuenta!</p>
            <div class="footer-links">
                <span><i class="fas fa-microchip"></i> IA: MobileNet</span>
                <span><i class="fas fa-camera"></i> Escaneo automático</span>
                <span><i class="fas fa-robot"></i> Detección en tiempo real</span>
                <span><i class="fas fa-arduino"></i> Arduino compatible</span>
            </div>
        </div>
    </footer>

    <!-- ==========================================================
         SCRIPTS
         ========================================================== -->
    <script>
        // ===== MODO OSCURO/CLARO =====
        const themeToggle = document.getElementById('themeToggleAuth');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('light-mode')) {
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                } else {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                }
            });
        }

        // ===== REGISTRO =====
        async function registrarUsuario() {
            const nombre = document.getElementById('reg_nombre').value;
            const email = document.getElementById('reg_email').value;
            const password = document.getElementById('reg_password').value;
            const password2 = document.getElementById('reg_password2').value;
            const mensaje = document.getElementById('mensajeRegistro');
            if (!nombre || !email || !password || !password2) { mensaje.innerHTML = '<p style="color: #e74c3c;">❌ Completa todos los campos</p>'; return; }
            if (password !== password2) { mensaje.innerHTML = '<p style="color: #e74c3c;">❌ Las contraseñas no coinciden</p>'; return; }
            if (password.length < 6) { mensaje.innerHTML = '<p style="color: #e74c3c;">❌ Mínimo 6 caracteres</p>'; return; }
            try {
                const response = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, contrasena: password })
                });
                const data = await response.json();
                if (response.status === 201) {
                    mensaje.innerHTML = `<p style="color: #2ecc71;">✅ ${data.mensaje}</p>`;
                    setTimeout(() => { window.location.href = '/login'; }, 1500);
                } else {
                    mensaje.innerHTML = `<p style="color: #e74c3c;">❌ ${data.error}</p>`;
                }
            } catch (error) {
                mensaje.innerHTML = '<p style="color: #e74c3c;">❌ Error al registrarse</p>';
            }
        }
        document.getElementById('reg_password2').addEventListener('keypress', e => { if (e.key === 'Enter') registrarUsuario(); });
    </script>
</body>
</html>
