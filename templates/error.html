<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♻️ EcoRecicla - Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-forest">
    <div class="error-container">
        <div class="error-card">
            <i class="fas fa-exclamation-triangle"></i>
            <h1>⛔ Acceso Denegado</h1>
            <p>{{ mensaje or 'No tienes permisos para acceder a esta sección.' }}</p>
            <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap; margin-top:20px;">
                <a href="{{ url_for('dashboard') }}" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver al panel</a>
                <a href="{{ url_for('index') }}" class="btn-volver" style="background:rgba(255,255,255,0.1);"><i class="fas fa-home"></i> Ir al inicio</a>
            </div>
        </div>
    </div>
</body>
</html>
