<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♻️ Sistema de Reciclaje Inteligente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <!-- Tarjeta principal con formulario de reciclaje -->
        <div class="card">
            <div class="header">
                <h1>♻️ Sistema de Reciclaje Inteligente</h1>
                <p>¡Recicla correctamente y gana puntos!</p>
            </div>

            <div class="formulario">
                <div class="form-group">
                    <label>👤 ID del Usuario</label>
                    <input type="number" id="usuario_id" placeholder="Ej: 1" value="1">
                </div>

                <div class="form-group">
                    <label>🗑️ Tipo de Residuo</label>
                    <select id="tipo_residuo">
                        <option value="plastic">🥤 Botella de Plástico</option>
                        <option value="glass">🍾 Botella de Vidrio</option>
                        <option value="metal">🥫 Lata de Metal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🤖 Confianza de la IA (%)</label>
                    <input type="number" id="confianza" step="0.01" value="96.5" min="0" max="100">
                </div>

                <button class="btn-registrar" onclick="registrarReciclaje()">
                    🌍 REGISTRAR RECICLAJE
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Procesando...</p>
                </div>

                <div id="resultado" class="resultado"></div>
            </div>
        </div>

        <!-- Sección: Ranking -->
        <div class="tabla-container">
            <h3>🏆 Ranking de Recicladores</h3>
            <div id="ranking">
                <p>Cargando ranking...</p>
            </div>
        </div>

        <!-- Sección: Estadísticas del usuario -->
        <div class="tabla-container">
            <h3>📊 Mis Estadísticas</h3>
            <div id="estadisticas">
                <p>Ingresa un ID de usuario para ver sus estadísticas</p>
            </div>
        </div>

        <!-- Sección: Crear nuevo usuario -->
        <div class="tabla-container">
            <h3>➕ Crear Nuevo Usuario</h3>
            <div class="form-row">
                <input type="text" id="nuevo_nombre" placeholder="Nombre" style="width: 35%; padding: 10px; margin-right: 10px;">
                <input type="email" id="nuevo_email" placeholder="Email" style="width: 35%; padding: 10px; margin-right: 10px;">
                <button class="btn-crear" onclick="crearUsuario()">➕ CREAR USUARIO</button>
            </div>
            <div id="mensaje_usuario" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div class="footer">
        <p>🌱 ¡Cada botella reciclada es un paso para salvar el planeta!</p>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
